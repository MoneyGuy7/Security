<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yakton Compound Security Network</title>

<style>

body{
margin:0;
background:#0a0f14;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

header{
background:#b30000;
color:white;
text-align:center;
padding:18px;
font-size:26px;
font-weight:bold;
letter-spacing:2px;
}

.sub{
font-size:14px;
opacity:.9;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#111820;
border-radius:10px;
padding:20px;
box-shadow:0 0 15px rgba(0,0,0,.6);
}

.card h2{
margin-top:0;
font-size:18px;
}

.progress{
background:#1c2630;
border-radius:20px;
overflow:hidden;
height:16px;
margin:10px 0;
}

.bar{
height:100%;
background:#00ff88;
width:40%;
transition:width .5s;
}

.log{
background:black;
color:#00ff88;
font-family:monospace;
height:250px;
overflow:auto;
padding:10px;
font-size:13px;
}

.radar{
width:200px;
height:200px;
border-radius:50%;
border:3px solid #00ff88;
margin:auto;
position:relative;
overflow:hidden;
}

.scan{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:conic-gradient(
rgba(0,255,150,.4),
transparent 40%
);
animation:spin 3s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.circle{
width:120px;
height:120px;
border-radius:50%;
border:10px solid #1c2630;
border-top:10px solid #00ff88;
margin:auto;
animation:spin 2s linear infinite;
}

.counter{
font-size:40px;
text-align:center;
margin-top:10px;
color:#ff3b3b;
}

</style>
</head>

<body>

<header>
YAKTON COMPOUND — SECURITY BREACH DETECTED
<div class="sub">Facility Defense Network</div>
</header>

<div class="dashboard">

<div class="card">
<h2>System Integrity</h2>

Network Stability
<div class="progress"><div class="bar" id="net"></div></div>

Firewall Strength
<div class="progress"><div class="bar" id="fire"></div></div>

AI Defense
<div class="progress"><div class="bar" id="ai"></div></div>

</div>

<div class="card">

<h2>Intrusion Radar</h2>

<div class="radar">
<div class="scan"></div>
</div>

</div>

<div class="card">

<h2>Intrusion Attempts</h2>

<div class="counter" id="count">0</div>

</div>

<div class="card" style="grid-column:span 3">

<h2>Live Breach Terminal</h2>

<div class="log" id="log">
> Yakton Compound Security Network Online
</div>

</div>

</div>

<script>

const log=document.getElementById("log")
const count=document.getElementById("count")

function addLog(text){

let time=new Date().toLocaleTimeString()

log.innerHTML+="<br>> ["+time+"] "+text

log.scrollTop=log.scrollHeight

}

const events=[

"Unauthorized access attempt detected",
"External system probing firewall",
"Security camera loop triggered",
"Encrypted data exfiltration detected",
"Admin credential spoof attempt",
"Database archive scan initiated",
"Remote command injection blocked",
"Unknown device detected inside network"

]

let attacks=0

setInterval(()=>{

let msg=events[Math.floor(Math.random()*events.length)]

addLog(msg)

attacks++

count.innerText=attacks

},2000)



function randomBar(id){

document.getElementById(id).style.width=Math.floor(Math.random()*80)+"%"

}

setInterval(()=>{

randomBar("net")
randomBar("fire")
randomBar("ai")

},3000)

</script>

</body>
</html>
